name: Nightly Lexer Equivalence

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  lexer-equivalence-k6:
    name: Lexer Equivalence (k=6)
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p lexer-equivalence --release --test equivalence
        env:
          LEXER_EQUIV_K: "6"
      - name: File bug on failure
        if: failure()
        run: |
          TITLE="Nightly lexer equivalence failure (k=6)"
          BODY="The nightly k=6 lexer equivalence test failed. See [run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."

          existing=$(gh issue list --state open --search "${TITLE} in:title" --json number --jq '.[0].number' || true)
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label bug
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
